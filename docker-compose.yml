# CRM MVP — Docker Compose base (app services only)
#
# Do NOT run this file directly. Use compose-up.ps1 which selects the right overlay:
#
#   .\scripts\docker\compose-up.ps1                 # development (DBs in Docker)
#   .\scripts\docker\compose-up.ps1 -Env prod       # production (external DBs)
#
# Overlay files:
#   docker-compose.dev.yml   — adds postgres/postgres-keycloak/postgres-logs containers
#   docker-compose.prod.yml  — adds external DB env var overrides and production settings
#
# Access (dev):
#   http://localhost:8080/api/...              — CRM API (via Gateway)
#   http://localhost:8080/auth/admin           — Keycloak admin (keycloak / keycloak)
#   http://localhost:8888/accounts/default     — Config server (verify config serving)
#   http://localhost:15672                     — RabbitMQ management (guest / guest)

services:

  # ---------------------------------------------------------------------------
  # RabbitMQ
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Keycloak  (start-dev mode + realm auto-import)
  # DB connection vars default to the dev postgres-keycloak container.
  # Override by setting KEYCLOAK_DB_HOST / KEYCLOAK_DB_USER / KEYCLOAK_DB_PASSWORD
  # in docker-compose.prod.yml or a .env file for production.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--import-realm"]
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: ${KEYCLOAK_DB_HOST:-postgres-keycloak}
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: keycloak
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
    volumes:
      - ./deployment/files/realmconfig/keycloak-crm-realm-config.json:/opt/keycloak/data/import/crm-realm.json:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/9000"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Keycloak user init — runs once after Keycloak is healthy
  # Creates testuser (crm_sales) and testuser2 (crm_sales) in the crm realm.
  # ---------------------------------------------------------------------------
  keycloak-init:
    image: curlimages/curl:latest
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |-
        set -e
        echo "Getting Keycloak admin token..."
        TOKEN=$$(curl -sf -X POST \
          http://keycloak:8080/auth/realms/master/protocol/openid-connect/token \
          -d "client_id=admin-cli&grant_type=password&username=keycloak&password=keycloak" \
          | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
        if [ -z "$$TOKEN" ]; then echo "ERROR: no admin token"; exit 1; fi
        echo "Got admin token."

        create_user() {
          uname=$$1 upass=$$2 urole=$$3
          echo "--- Creating user $$uname ---"
          status=$$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://keycloak:8080/auth/admin/realms/crm/users \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$$uname\",\"email\":\"$$uname@example.com\",\"firstName\":\"Test\",\"lastName\":\"User\",\"enabled\":true,\"emailVerified\":true,\"credentials\":[{\"type\":\"password\",\"value\":\"$$upass\",\"temporary\":false}]}")
          if [ "$$status" = "201" ]; then
            echo "User $$uname created."
          elif [ "$$status" = "409" ]; then
            echo "User $$uname already exists, skipping."
          else
            echo "ERROR: HTTP $$status creating $$uname"; exit 1
          fi
          user_id=$$(curl -sf \
            "http://keycloak:8080/auth/admin/realms/crm/users?username=$$uname&exact=true" \
            -H "Authorization: Bearer $$TOKEN" \
            | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          role_rep=$$(curl -sf \
            "http://keycloak:8080/auth/admin/realms/crm/roles/$$urole" \
            -H "Authorization: Bearer $$TOKEN")
          curl -sf -X POST \
            "http://keycloak:8080/auth/admin/realms/crm/users/$$user_id/role-mappings/realm" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d "[$$role_rep]"
          echo "Role $$urole assigned to $$uname."
        }

        create_user testuser  testpassword  crm_sales
        create_user testuser2 testpassword2 crm_sales
        echo "All users created."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Spring Cloud Config Server  (port 8888)
  # Single source of truth for all service configuration.
  # All application services depend on this being healthy before starting.
  # ---------------------------------------------------------------------------
  config-server:
    build:
      context: ./Config
    image: config-server:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Gateway  (Spring Cloud Gateway — single public entry point on :8080)
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./Gateway
    image: gateway:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Customer service  (port 8080 internally)
  # ---------------------------------------------------------------------------
  customer:
    build:
      context: ./Customer
    image: customer:latest
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Accounts service  (port 8081 internally)
  # ---------------------------------------------------------------------------
  accounts:
    build:
      context: ./Accounts
    image: accounts:latest
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Contacts service  (port 8082 internally)
  # ---------------------------------------------------------------------------
  contacts:
    build:
      context: ./Contacts
    image: contacts:latest
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Opportunities service  (port 8083 internally)
  # ---------------------------------------------------------------------------
  opportunities:
    build:
      context: ./Opportunities
    image: opportunities:latest
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Activities service  (port 8084 internally)
  # ---------------------------------------------------------------------------
  activities:
    build:
      context: ./Activities
    image: activities:latest
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Log Consumer  (no HTTP port — consumes from RabbitMQ only)
  # ---------------------------------------------------------------------------
  log-consumer:
    build:
      context: ./LogConsumer
    image: log-consumer:latest
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy
