spring.application.name=${SPRING_APP_NAME:Customer}

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/maindb}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Spring Security - OAuth2 Resource Server (JWT)
# jwk-set-uri fetches public keys from the internal Keycloak service.
# Unlike issuer-uri, it does not validate the iss claim, so tokens obtained
# via localhost:8080 (port-forward) and keycloak:8080 (internal) are both accepted.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI}

# Keycloak Configuration
keycloak.realm=${KEYCLOAK_REALM}
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL}
keycloak.ssl-required=${KEYCLOAK_SSL_REQUIRED}
keycloak.resource=${KEYCLOAK_RESOURCE}
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET}
keycloak.bearer-only=${KEYCLOAK_BEARER_ONLY}
keycloak.use-resource-role-mappings=${KEYCLOAK_USE_RESOURCE_ROLE_MAPPINGS}

spring.datasource.continue-on-error=true
spring.sql.init.continue-on-error=true
spring.sql.init.mode=always

logging.level.org.springframework=DEBUG
