spring.application.name=Gateway

# Logger API route
spring.cloud.gateway.routes[0].id=logger-message-queue-api
spring.cloud.gateway.routes[0].uri=lb://LOGGERMESSAGEQUEUEAPI
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/logs/**

spring.cloud.gateway.routes[1].id=notes
spring.cloud.gateway.routes[1].uri=lb://NOTES
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notes/**

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG

spring.security.oauth2.client.provider.keycloack.issuer-uri=http://keycloak:8080/realms/myrealm
spring.cloud.gateway.discovery.locator.enabled=true
            
            
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL}
