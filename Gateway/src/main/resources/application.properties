spring.application.name=gateway

# Spring Security - validate JWTs using Keycloak's JWK endpoint (same as Customer)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Upstream service URIs (injected from Helm configmap)
gateway.routes.keycloak-uri=${KEYCLOAK_URI:http://keycloak:8080}
gateway.routes.customer-uri=${CUSTOMER_URI:http://customer:8080}
gateway.routes.accounts-uri=${ACCOUNTS_URI:http://accounts:8081}
gateway.routes.contacts-uri=${CONTACTS_URI:http://contacts:8082}
gateway.routes.opportunities-uri=${OPPORTUNITIES_URI:http://opportunities:8083}
gateway.routes.activities-uri=${ACTIVITIES_URI:http://activities:8084}

# Serialize Instant as ISO-8601 string so LogConsumer can parse with Instant.parse()
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator (used by Kubernetes readiness/liveness probes)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Health groups — liveness only checks the app itself (never kills pod due to RabbitMQ being down)
# Readiness includes rabbit so traffic is withheld until RabbitMQ is available
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=ping,rabbit

logging.level.fi.breakwaterworks=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
