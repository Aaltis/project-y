apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: {{ .Values.keycloak.service.port }}
      targetPort: 8080
      nodePort: {{ .Values.keycloak.service.nodePort }}
  type: {{ .Values.keycloak.service.type }}
---

#another one
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: keycloak