apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/limit-rpm: "20"  # Max 20 requests per minute per IP
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"  # Burst limit
spec:
  ingressClassName: nginx  # Ensure you have an NGINX ingress controller
  rules:
  - host: api.example.com  # This will be the main URL
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 8080
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: spring-boot-api
            port:
              number: 8080
