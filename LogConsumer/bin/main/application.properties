spring.application.name=log-consumer

# PostgreSQL - dedicated logs database
spring.datasource.url=${LOGSDB_URL:jdbc:postgresql://postgres-logs:5432/logsdb}
spring.datasource.username=${LOGSDB_USER:loguser}
spring.datasource.password=${LOGSDB_PASSWORD:logpassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Retry connection to RabbitMQ on startup (it may start after this service)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=5000
spring.rabbitmq.listener.simple.retry.max-attempts=10

logging.level.fi.breakwaterworks=DEBUG
