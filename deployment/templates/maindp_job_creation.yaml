apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: postgres-init
        image: postgres:13
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "⏳ Waiting for PostgreSQL to be ready..."
            until pg_isready -h postgres -U postgres -p 5432; do
              echo "🔄 Still waiting for PostgreSQL..."
              sleep 5
            done
            echo "✅ PostgreSQL is ready!"
            echo "🚀 Running init.sql..."
            PGPASSWORD="${POSTGRES_PASSWORD}" psql -h postgres -U postgres -f /docker-entrypoint-initdb.d/init.sql
            echo "✅ Database initialization completed!"
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_password
        volumeMounts:
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-sql
        configMap:
          name: postgres-init-sql
