apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /  # Ensures incoming request paths match the backend service's expected URL structure.
    nginx.ingress.kubernetes.io/limit-rpm: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-set-header: "X-Forwarded-Proto http"
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host | default "localhost" }}  # Default hostname if missing in values.yaml
    http:
      paths:
      # Route /auth requests to Keycloak
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 8080  # Correct default for Keycloak

      # Route /api requests to Customer Service
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: customer
            port:
              number: {{ .Values.customer.service.port | default 80 }}  # Correct default for Customer Service
