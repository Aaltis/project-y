# ------------------------------------
# Spring Cloud Gateway Deployment
# ------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
        imagePullPolicy: "{{ .Values.gateway.pullPolicy }}"
        env:
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: keycloak_jwk_set_uri
        - name: CUSTOMER_URI
          value: "http://customer:8080"
        - name: KEYCLOAK_URI
          value: "http://keycloak:8080"
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          value: "{{ .Values.rabbitmq.config.defaultUser }}"
        - name: RABBITMQ_PASSWORD
          value: "{{ .Values.rabbitmq.config.defaultPass }}"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
