apiVersion: apps/v1
kind: Deployment
metadata:
  name: opportunities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opportunities
  template:
    metadata:
      labels:
        app: opportunities
    spec:
      containers:
      - name: opportunities
        image: "{{ .Values.opportunities.image }}:{{ .Values.opportunities.tag }}"
        imagePullPolicy: "{{ .Values.opportunities.pullPolicy }}"
        env:
        - name: SPRING_APP_NAME
          value: "Opportunities"
        - name: DATABASE_URL
          value: "jdbc:postgresql://postgres:5432/opportunitiesdb"
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_password
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: keycloak_jwk_set_uri
        ports:
        - containerPort: 8083
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: opportunities
spec:
  type: ClusterIP
  selector:
    app: opportunities
  ports:
  - port: 8083
    targetPort: 8083
