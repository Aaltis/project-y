apiVersion: apps/v1
kind: Deployment
metadata:
  name: opportunities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opportunities
  template:
    metadata:
      labels:
        app: opportunities
    spec:
      containers:
      - name: opportunities
        image: "{{ .Values.opportunities.image }}:{{ .Values.opportunities.tag }}"
        imagePullPolicy: "{{ .Values.opportunities.pullPolicy }}"
        ports:
        - containerPort: 8083
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: opportunities
spec:
  type: ClusterIP
  selector:
    app: opportunities
  ports:
  - port: 8083
    targetPort: 8083
