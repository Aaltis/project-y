apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
    spec:
      containers:
      - name: accounts
        image: "{{ .Values.accounts.image }}:{{ .Values.accounts.tag }}"
        imagePullPolicy: "{{ .Values.accounts.pullPolicy }}"
        env:
        - name: SPRING_APP_NAME
          value: "Accounts"
        - name: DATABASE_URL
          value: "jdbc:postgresql://postgres:5432/accountsdb"
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_password
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: keycloak_jwk_set_uri
        ports:
        - containerPort: 8081
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: accounts
spec:
  type: ClusterIP
  selector:
    app: accounts
  ports:
  - port: 8081
    targetPort: 8081
