apiVersion: apps/v1
kind: Deployment
metadata:
  name: activities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activities
  template:
    metadata:
      labels:
        app: activities
    spec:
      containers:
      - name: activities
        image: "{{ .Values.activities.image }}:{{ .Values.activities.tag }}"
        imagePullPolicy: "{{ .Values.activities.pullPolicy }}"
        ports:
        - containerPort: 8084
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: activities
spec:
  type: ClusterIP
  selector:
    app: activities
  ports:
  - port: 8084
    targetPort: 8084
