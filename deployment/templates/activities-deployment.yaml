apiVersion: apps/v1
kind: Deployment
metadata:
  name: activities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activities
  template:
    metadata:
      labels:
        app: activities
    spec:
      containers:
      - name: activities
        image: "{{ .Values.activities.image }}:{{ .Values.activities.tag }}"
        imagePullPolicy: "{{ .Values.activities.pullPolicy }}"
        env:
        - name: SPRING_APP_NAME
          value: "Activities"
        - name: DATABASE_URL
          value: "jdbc:postgresql://postgres:5432/activitiesdb"
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_password
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: keycloak_jwk_set_uri
        ports:
        - containerPort: 8084
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8084
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: activities
spec:
  type: ClusterIP
  selector:
    app: activities
  ports:
  - port: 8084
    targetPort: 8084
