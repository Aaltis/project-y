apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagrams
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagrams
  template:
    metadata:
      labels:
        app: diagrams
    spec:
      containers:
      - name: diagrams
        image: "{{ .Values.diagrams.image }}:{{ .Values.diagrams.tag }}"
        imagePullPolicy: "{{ .Values.diagrams.pullPolicy }}"
        ports:
        - containerPort: 8086
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: diagrams
spec:
  type: ClusterIP
  selector:
    app: diagrams
  ports:
  - port: 8086
    targetPort: 8086
