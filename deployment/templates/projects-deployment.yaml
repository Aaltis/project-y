apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projects
  template:
    metadata:
      labels:
        app: projects
    spec:
      containers:
      - name: projects
        image: "{{ .Values.projects.image }}:{{ .Values.projects.tag }}"
        imagePullPolicy: "{{ .Values.projects.pullPolicy }}"
        ports:
        - containerPort: 8085
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8085
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8085
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: projects
spec:
  type: ClusterIP
  selector:
    app: projects
  ports:
  - port: 8085
    targetPort: 8085
