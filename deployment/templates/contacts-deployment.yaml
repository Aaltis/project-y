apiVersion: apps/v1
kind: Deployment
metadata:
  name: contacts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contacts
  template:
    metadata:
      labels:
        app: contacts
    spec:
      containers:
      - name: contacts
        image: "{{ .Values.contacts.image }}:{{ .Values.contacts.tag }}"
        imagePullPolicy: "{{ .Values.contacts.pullPolicy }}"
        env:
        - name: SPRING_APP_NAME
          value: "Contacts"
        - name: DATABASE_URL
          value: "jdbc:postgresql://postgres:5432/contactsdb"
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: main_database_password
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: keycloak_jwk_set_uri
        ports:
        - containerPort: 8082
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 40
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: contacts
spec:
  type: ClusterIP
  selector:
    app: contacts
  ports:
  - port: 8082
    targetPort: 8082
