apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image }}:{{ .Values.keycloak.tag }}"
          args:
            - "start-dev"
            - "--import-realm"
          env:
            # --- Database ---
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL_HOST
              value: "{{ .Values.keycloak.database.host }}"
            - name: KC_DB_URL_DATABASE
              value: "{{ .Values.keycloak.database.name }}"
            - name: KC_DB_USERNAME
              value: "{{ .Values.keycloak.database.user }}"
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: KC_DB_PASSWORD

            # --- Bootstrap admin ---
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "keycloak"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "keycloak"

            # --- Network & proxy ---
            - name: KC_PROXY
              value: "edge"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_HEALTH_ENABLED
              value: "true"

          ports:
            - containerPort: 8080
            - containerPort: 9000  # Keycloak 26+ management interface (health/metrics)

          startupProbe:
            httpGet:
              path: /auth/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: 9000
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import

      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-crm-realm-config
---
# ------------------------------------
# Keycloak ConfigMap (Realm Import)
# ------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-crm-realm-config
data:
  keycloak-crm-realm-config.json: |-
    {{- .Files.Get "files/realmconfig/keycloak-crm-realm-config.json" | nindent 4 }}

---
# ------------------------------------
# Keycloak Service
# ------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8080  # This must match the Ingress definition
      targetPort: 8080
  type: ClusterIP  # ClusterIP required for ingress
  