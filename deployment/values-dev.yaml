replicaCount: 1
environment: "dev"
# Keycloak
keycloak:
  image: quay.io/keycloak/keycloak
  tag: latest
  service:
    type: ClusterIP  # ClusterIP is required for Ingress to route traffic
    port: 8080       # Ensure this matches the Ingress port
  database:
    host: postgres-keycloak
    port: 5432
    user: keycloak
    password: "securepassword"
    name: keycloak
  ingress:
    enabled: true
    host: localhost  # Ingress is routing to localhost
  realmConfigMap: keycloak-crm-realm-config
  config:
    realm: "crm"
    server_url: "http://keycloak:8080/auth"
    client_id: "crm-api"
    client_secret: ""
    issuer_uri: "http://keycloak:8080/auth/realms/crm"
    jwk_set_uri: "http://keycloak:8080/auth/realms/crm/protocol/openid-connect/certs"
  admin:
    username: "admin"
    password: "admin"
  testUser:
    username: "testuser"
    password: "testpassword"
    role: "crm_sales"
  testUser2:
    username: "testuser2"
    password: "testpassword2"
    role: "crm_sales"


# Spring Boot API
customer:
  image: customer
  tag: latest
  pullPolicy: Never  # Image must be pre-built into minikube's docker daemon: eval $(minikube docker-env) && docker build -t customer:latest .
  config:
    main_database_url: "jdbc:postgresql://postgres:5432/maindb"
    main_database_user: "postgres"
    main_database_driver: "org.postgresql.Driver"
    jpa_dialect: "org.hibernate.dialect.PostgreSQLDialect"
    jpa_hibernate: "update"
    spring_profiles_active: "dev"
    app_mode: "development"
    feature_flag_new_ui: "false"
    admin_username: "admin"
  service:
    name: customer-service
    port: 8080
  secret:
    database_password: "postgres"  # DO NOT store real passwords here! Use environment variables.

# PostgreSQL
postgres:
  enabled: true
  image: postgres:13
  service:
    type: ClusterIP
    port: 5432
  storage:
    size: 5Gi
  persistence:
    existingClaim: "postgres-keycloak-pvc"

ingress:
  enabled: true
  host: "localhost"
  paths:
    - path: /
      backendService: gateway
      backendPort: 8080

gateway:
  image: gateway
  tag: latest
  pullPolicy: Never

accounts:
  image: accounts
  tag: latest
  pullPolicy: Never

contacts:
  image: contacts
  tag: latest
  pullPolicy: Never

opportunities:
  image: opportunities
  tag: latest
  pullPolicy: Never

activities:
  image: activities
  tag: latest
  pullPolicy: Never

rabbitmq:
  image: rabbitmq:3-management
  config:
    defaultUser: guest
    defaultPass: guest

logConsumer:
  image: log-consumer
  tag: latest
  pullPolicy: Never

logsdb:
  image: postgres:13
  database: logsdb
  user: loguser
  password: logpassword
  storage:
    size: 5Gi

secrets:
  jwt_secret: "supersecretjwtkey"
  maindb_name: "maindb"
  main_database_user: "postgres"
  main_database_password: "postgres"
  KC_DB_PASSWORD: "keycloak"
  KC_BOOTSTRAP_ADMIN_PASSWORD: "keycloak"
  logsdb_password: "logpassword"