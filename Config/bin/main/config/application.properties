# Shared properties served to ALL Spring Boot clients

# PostgreSQL driver (same for all DB services)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Keycloak JWT validation (same endpoint for all 6 secured services)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/auth/realms/crm/protocol/openid-connect/certs

# Actuator (uniform across all services)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
