# Route URIs (service names are identical in Docker Compose and Kubernetes)
gateway.routes.keycloak-uri=http://keycloak:8080
gateway.routes.customer-uri=http://customer:8080
gateway.routes.accounts-uri=http://accounts:8081
gateway.routes.contacts-uri=http://contacts:8082
gateway.routes.opportunities-uri=http://opportunities:8083
gateway.routes.activities-uri=http://activities:8084
gateway.routes.projects-uri=http://projects:8085
gateway.routes.diagrams-uri=http://diagrams:8086

# RabbitMQ
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Serialize Instant as ISO-8601 so LogConsumer can parse with Instant.parse()
spring.jackson.serialization.write-dates-as-timestamps=false

# Health groups: liveness = app only, readiness = app + rabbit
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=ping,rabbit

logging.level.fi.breakwaterworks=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
